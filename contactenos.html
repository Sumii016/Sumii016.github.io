<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <TItle>Contáctenos</TItle>
        <link rel="stylesheet" href="css/estilos.css">
        <script src="js/validacionescontacto.js"></script>
    </head>
    <body>
        <header>
            <div class="logo">
            <img src="assets/logo.jpeg">
            <h1>Fundación Parkinson HN</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#inicio">Inicio</a></li>
                    <li><a href="eventos.html">Eventos</a></li>
                    <li><a href="contactenos.html"></a>Contáctenos</li>
                </ul>
            </nav>
        </header>
        <section class="container contacto-formulario">
            <div class="row">
                <div class="col-12">
                    <h2 class="titulo-seccion">Contáctenos</h2>
                </div>
            </div>
            <div class="row">
                <div class="col-6 offset-3">
                    <form action="contactenos.html">
                           <label for="txtNombre">Nombre completo:</label>
                    <input type="text" id="txtNombre" name="nombre" placeholder="Juan Pérez García" required>
                     <label for="txtEmail">Correo electrónico:</label>
                    <input type="email" id="txtEmail" name="email" placeholder="juanG@gmail.com" required>
                    <label for="txtTelefono">Teléfono</label>
                    <input type="tel" id="txtTelefono" name="telefono" placeholder="9876-5432" required>

                    <label for="interes">Motivo</label>
                    <select name="interes" id="Motivo">
                        <option value="consulta">Consulta general</option>
                        <option value="donacion">Donacion</option>
                        <option value="voluntario">Voluntariado</option>
                        <option value="Parkinson">Sintomas del parkinson</option>
                        <option value="otros">Otros</option>
                        </select required>
                       <label for="txtMensaje">Mensaje:</label>
                       <textarea id="txtMensaje" name="mensaje" placeholder="Escriba su mensaje" rows="8" maxlength="1024" required></textarea>
                       <div id="errorContainer" class="error"></div>
                       <button type="submit">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </section>
        <footer>
            <div class="footer-texto">
                & Fundación Parkinson Honduras Todos los derechos reservados
            </div>
        </footer>
    </body>
</html>
